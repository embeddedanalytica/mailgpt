name: Email Service Unit Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "sam-app/email_service/**"
      - "sam-app/tests/**"
      - ".github/workflows/email-service-unit-tests.yml"
  push:
    branches:
      - main
    paths:
      - "sam-app/email_service/**"
      - "sam-app/tests/**"
      - ".github/workflows/email-service-unit-tests.yml"

permissions:
  contents: read

jobs:
  email-service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sam-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: sam-app/email_service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install boto3

      - name: Run unit tests
        env:
          PYTHONPATH: email_service
        run: python -m unittest discover -v -s tests/email_service -p "test_*.py"
