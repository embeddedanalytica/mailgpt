<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">SmartMail icon alternative 3</title>
  <desc id="desc">Dynamic route stripe crossing an envelope.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F5F8"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#E04300"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15253A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="180" y="280" width="664" height="466" rx="90" fill="#162A40"/>
    <path d="M180 390L512 622L844 390" fill="none" stroke="#6FA4D8" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="rotate(-20 512 512)">
    <rect x="96" y="456" width="832" height="112" rx="56" fill="url(#stripe)"/>
    <circle cx="202" cy="512" r="28" fill="#FFFFFF"/>
    <circle cx="822" cy="512" r="28" fill="#FFFFFF"/>
  </g>
</svg>
