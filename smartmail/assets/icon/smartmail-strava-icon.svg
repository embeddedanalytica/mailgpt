<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">SmartMail app icon</title>
  <desc id="desc">Rounded orange square with envelope and motion route mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FC6B1D"/>
      <stop offset="100%" stop-color="#E04600"/>
    </linearGradient>
    <linearGradient id="mail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFE6D8" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#7A2500" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="184" y="280" width="656" height="464" rx="96" fill="url(#mail)"/>
    <path d="M184 396L512 628L840 396" fill="none" stroke="#F25A12" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M332 770C418 712 494 712 578 770C640 812 706 810 760 778"
        fill="none" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round" opacity="0.95"/>
  <circle cx="760" cy="778" r="26" fill="#FFFFFF"/>
</svg>
